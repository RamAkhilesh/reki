name: reki
description: "reki — personal media tracking for movies, TV, anime, manga, books and games."
publish_to: 'none'

version: 1.0.5+6

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dynamic_color: ^1.7.0
  flutter_riverpod: ^2.6.1
  supabase_flutter: ^2.8.4
  go_router: ^14.0.0
  dio: ^5.7.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  shared_preferences: ^2.3.2
  file_picker: ^8.0.0
  share_plus: ^10.0.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.0
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.2
  palette_generator: ^0.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

# ── Launcher icons ────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/reki-app-icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#14131D"
  adaptive_icon_foreground: "assets/icon/reki-app-icon.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

# ── Native splash ─────────────────────────────────────────────
# Background matches the icon's dark background (#14131D).
flutter_native_splash:
  color: "#14131D"
  color_dark: "#14131D"
  image: "assets/icon/reki-wordmark.png"
  android_12:
    image: "assets/icon/reki-app-icon.png"
    color: "#14131D"
    color_dark: "#14131D"
  fullscreen: false
